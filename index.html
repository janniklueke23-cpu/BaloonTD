<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Lehrer vs. Schüler – Tower Defense</title>
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0a0a1a;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      overflow: hidden;
      font-family: monospace;
    }

    canvas {
      display: block;
      box-shadow: 0 0 60px rgba(100, 100, 255, 0.3),
                  0 0 120px rgba(50, 50, 150, 0.15);
      border: 1px solid rgba(100, 100, 200, 0.2);
    }

    #ladetext {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: #8080ff;
      font-size: 1.2rem;
      font-family: monospace;
      z-index: 10;
      pointer-events: none;
    }
  </style>
</head>
<body>

  <div id="ladetext">Lehrer vs. Schüler wird geladen...</div>

  <script src="p5.min.js"></script>

  <script src="highscoreManager.js?v=4"></script>
  <script src="settingsManager.js?v=4"></script>
  <script src="soundManager.js?v=4"></script>
  <script src="upgradeManager.js?v=4"></script>
  <script src="economyManager.js?v=4"></script>

  <script src="enemy.js?v=4"></script>
  <script src="tower.js?v=4"></script>
  <script src="mathTeacher.js?v=4"></script>
  <script src="peTeacher.js?v=4"></script>
  <script src="principal.js?v=4"></script>
  <script src="bioTeacher.js?v=4"></script>

  <script src="waveManager.js?v=4"></script>

  <script src="uiManager.js?v=4"></script>
  <script src="menuScene.js?v=4"></script>
  <script src="gameScene.js?v=4"></script>

  <script src="sketch.js?v=4"></script>

  <script>
    window.addEventListener('load', function() {
      setTimeout(function() {
        let ladetext = document.getElementById('ladetext');
        if (ladetext) ladetext.style.display = 'none';
      }, 500);
    });
  </script>

</body>
</html>
